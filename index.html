  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3">
           <div id="editBanner" class="alert alert-warning d-none">
  You are editing a post...
           </div>

        </div>
      </div>
    </div>
    <div class="container-fluid mt-3">
      <div class="row">
        <div class="col-md-6 offset-md-3">
          <div class="card mb-3">
            <div class="card-body">
              <form id="formID">
                <div class="form-group">
                  <label for="title" class="font-weight-bold">Title*</label>
                  <input type="text" id="title" required class="form-control" />
                </div>

                <div class="form-group">
                  <label for="body" class="font-weight-bold">Body*</label>
                  <textarea rows="4" id="body" required class="form-control"></textarea>
                </div>
                <div class="form-group">
                  <label for="userId" class="font-weight-bold">UserId*</label>
                  <select type="text" id="userId" class="form-control">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                  </select>
                </div>

                <button
                  id="addbtn"
                  class="btn btn-sm btn-block btn-outline-primary"
                >
                  Add Post
                </button>
                <button
                type="button"
                  id="updatebtn"
                  class="btn btn-sm btn-block btn-outline-primary d-none">
                
                  Update Post
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
